name: Refresh catalog daily

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build catalog
        env:
          BOL_CLIENT_ID:     ${{ secrets.BOL_CLIENT_ID }}
          BOL_CLIENT_SECRET: ${{ secrets.BOL_CLIENT_SECRET }}
        run: python scripts/build_catalog.py catalog.json

      - name: Commit if changed
        run: |
          if git diff --quiet catalog.json; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name  "boxi-bot"
          git config user.email "boxi-bot@users.noreply.github.com"
          git add catalog.json
          git commit -m "🤖 daily catalog refresh ($(date -u +%Y-%m-%d))"
          git push
